[mypy]
# Target folder for type checking
files = price_comparison/*.py, price_comparison/**/*.py

# Ignore missing type hints for third-party libraries
ignore_missing_imports = True

# Exclude virtual environments and egg-info folders
exclude = venv|\.egg-info

# Treat untyped functions as having Any return type (prevents cascading errors)
disallow_untyped_calls = False
disallow_untyped_defs = False
check_untyped_defs = True

# Allow dynamic attributes for classes that are initialized dynamically (like in scrapers)
allow_untyped_globals = True
follow_imports = silent

# Optional: warn about unused 'Any' types
warn_unused_ignores = True
warn_return_any = True
warn_redundant_casts = True

# Optional: stricter checks for literals, optional types, and numeric conversions
strict_optional = True
no_implicit_optional = True

# Forcing explicit string conversions (your numeric fields like price, gb, units are strings)
strict_equality = True
